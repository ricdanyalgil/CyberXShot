name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac -- --universal
          - os: windows-latest
            command: npm run dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate Apple signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" || -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "::error::Missing one or more Apple signing secrets."
            exit 1
          fi
      - run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find release -type d -name '*.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::Packaged macOS app was not found."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --verbose=2 --type exec "$app_path"
          dmg_path="$(find release -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "::error::Packaged macOS DMG was not found."
            exit 1
          fi
          codesign --verify --verbose=2 "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess --verbose=2 --type open --context context:primary-signature "$dmg_path"
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
