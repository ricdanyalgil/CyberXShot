name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run dist:mac -- --arm64 --x64
          - os: windows-latest
            command: npm run dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate Apple signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" || -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "::error::Missing one or more Apple signing secrets."
            exit 1
          fi
      - run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_paths=()
          while IFS= read -r app_path; do app_paths+=("$app_path"); done < <(find release -mindepth 2 -maxdepth 2 -type d -name '*.app')
          if [[ ${#app_paths[@]} -ne 2 ]]; then
            echo "::error::Packaged macOS app was not found."
            exit 1
          fi
          for app_path in "${app_paths[@]}"; do
            codesign --verify --all-architectures --deep --strict --verbose=2 "$app_path"
            xcrun stapler validate "$app_path"
            spctl --assess --verbose=2 --type exec "$app_path"
          done
          dmg_paths=()
          while IFS= read -r dmg_path; do dmg_paths+=("$dmg_path"); done < <(find release -maxdepth 1 -type f -name '*.dmg')
          if [[ ${#dmg_paths[@]} -ne 2 ]]; then
            echo "::error::Packaged macOS DMG was not found."
            exit 1
          fi
          for dmg_path in "${dmg_paths[@]}"; do
            codesign --verify --verbose=2 "$dmg_path"
            xcrun stapler validate "$dmg_path"
            spctl --assess --verbose=2 --type open --context context:primary-signature "$dmg_path"
            mount_dir="$(mktemp -d)"
            hdiutil attach -nobrowse -readonly -mountpoint "$mount_dir" "$dmg_path"
            codesign --verify --all-architectures --deep --strict --verbose=2 "$mount_dir/CyberXShot.app"
            spctl --assess --verbose=2 --type exec "$mount_dir/CyberXShot.app"
            hdiutil detach "$mount_dir"
          done
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
